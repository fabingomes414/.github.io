<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP7 - Assistência Técnica</title>
    <style>
        /* Estilo Geral e Fundo Geométrico */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #030d14;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        /* Logo e Texto CHIP7 */
        .logo-area {
            margin-bottom: 30px;
        }

        .logo-circle {
            width: 150px;
            height: 150px;
            background: black;
            border-radius: 50%;
            border: 4px solid #111;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Simulando o ícone do chip do logo */
        .chip-icon {
            width: 80px;
            height: 80px;
            border: 4px solid white;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 40px;
            color: #d11d1d; /* Vermelho do Ci */
        }

        h1 {
            font-size: 3rem;
            margin: 10px 0;
            letter-spacing: 2px;
            font-weight: 800;
        }

        /* Estilização dos Botões */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .service-btn {
            display: block;
            text-decoration: none;
            color: white;
            font-size: 1.2rem;
            padding: 12px;
            border: 2px solid white;
            background: transparent;
            transition: all 0.3s ease;
            text-transform: capitalize;
        }

        .service-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* Rodapé com Telefone */
        .phone-number {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: white;
            text-decoration: none;
        }

        .phone-number:hover {
            color: #00e676; /* Cor do WhatsApp ao passar o mouse */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-area">
            <div class="logo-circle">
                <img src="https://i.pinimg.com/736x/b5/d9/45/b5d945c993f9bc16fac97949eca73422.jpg" alt="Logo CHIP7" style="width: 100%; border-radius: 50%;">
            </div>
            <h1>CHIP7</h1>
        </div>

        <div class="btn-group">
            <a href="https://wa.me/5537998633614?text=Olá,%20gostaria%20de%20agendar%20um%20atendimento%20de%20Formatação" class="service-btn">Formatação</a>
            <a href="https://wa.me/5537998633614?text=Olá,%20gostaria%20de%20agendar%20um%20atendimento%20de%20Limpeza" class="service-btn">Limpeza</a>
            <a href="https://wa.me/5537998633614?text=Olá,%20gostaria%20de%20agendar%20um%20atendimento%20de%20Montagem" class="service-btn">Montagem</a>
            <a href="https://wa.me/5537998633614?text=Olá,%20gostaria%20de%20agendar%20um%20atendimento%20de%20Manutenção" class="service-btn">Manutenção</a>
        </div>

        <a href="tel:37998633614" class="phone-number">37 99863-3614</a>
    </div>

</body>
</html>
